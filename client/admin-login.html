<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CivicFlow – Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
</head>

<body data-page="admin-login">

    <header class="auth-header">
        <a href="index.html" class="auth-header__logo">
            <span class="navbar__logo-mark">CF</span>
            <span class="navbar__logo-text">CivicFlow</span>
        </a>

        <button id="themeToggle" class="theme-toggle" type="button">
            Dark mode
        </button>
    </header>


    <main class="auth-layout">

        <section class="auth-card">

            <h1 class="auth-card__title">Admin Panel</h1>

            <p class="auth-card__subtitle">
                Login to manage civic complaints and system analytics.
            </p>

            <form id="adminLoginForm" novalidate>

                <div class="form-group">
                    <label for="adminUser">Admin Username</label>

                    <input type="text" id="adminUser" placeholder="Enter admin username" required />

                    <p class="form-error" id="adminUserError"></p>

                </div>


                <div class="form-group">

                    <label for="adminPassword">Password</label>

                    <input type="password" id="adminPassword" placeholder="Enter admin password" required />

                    <p class="form-error" id="adminPasswordError"></p>

                </div>


                <button type="submit" class="btn btn--primary btn--full">
                    Admin Login
                </button>

                <p class="form-success" id="adminLoginSuccess"></p>

            </form>

            <p class="auth-card__footer">
                Return to <a href="index.html">Home</a>
            </p>

        </section>

    </main>

    <script src="js/admin.js"></script>
    <!-- <script src="js/script.js"></script> -->

</body>

</html>
