<!DOCTYPE html>
<html>

<head>
    <title>Complaint Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .container p {
            margin-top: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 20px;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .subtitle {
            color: #94a3b8;
            margin-top: 5px;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mode-btn {
            background: #111827;
            color: white;
            border: 1px solid #1f2937;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        .report-btn {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        body.light-mode {
            background: #f1f5f9;
            color: #0f172a;
        }

        body.light-mode img {
            border: 1px solid #ddd;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
        }

        #caseId {
            font-size: 32px;
            font-weight: 600;
            color: #60a5fa;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        /* Modern select style */
        .status-row select {
            background: #0f172a;
            color: white;
            border: 1px solid #3b82f6;
            padding: 6px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        /* Modern button */
        .status-row button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
        }

        .status-row button:hover {
            background: #2563eb;
        }

        body.light-mode {
            background: #f1f5f9;
            color: #0f172a;
        }

        body.light-mode .container {
            background: transparent;
        }

        body.light-mode select {
            background: white;
            color: black;
        }

        body.light-mode img {
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>
    <header class="top-bar">

        <div>
            <h1>Complaint Details</h1>
            <p class="subtitle">View full information about your reported issue.</p>
        </div>

        <div class="user-panel">

            <span>👤 Admin</span>

            <button class="mode-btn" id="modeBtn" onclick="toggleMode()">
                Light Mode
            </button>

            <button class="report-btn" onclick="window.location.href='admin.html'">
                Return to Dashboard
            </button>

        </div>

    </header>

    <div class="container">

        <h1 id="caseId"></h1>

        <p><b>Title:</b> <span id="title"></span></p>
        <p><b>Description:</b> <span id="description"></span></p>
        <p><b>Category:</b> <span id="category"></span></p>
        <p><b>Location:</b> <span id="location"></span></p>

        <div class="status-row">
            <b>Status:</b>

            <select id="statusSelect">
                <option>Pending</option>
                <option>In Progress</option>
                <option>Resolved</option>
            </select>

            <button onclick="updateStatus()">Update Status</button>
        </div>

        <p><b>Submitted:</b> <span id="date"></span></p>
        <h3>Complaint Photo</h3>
        <img id="photo" />

        <h3>Location View</h3>

        <div style="display:flex; gap:20px; margin-top:20px;">
            <div id="map" style="height:350px;width:50%;border-radius:10px;"></div>
            <div id="streetView" style="height:350px;width:50%;border-radius:10px;"></div>
        </div>

    </div>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBjvZGb6q8WmS7nw_sVPoYFBY5GGKs4QV0"></script>
    <script>
        const params = new URLSearchParams(window.location.search)
        const caseId = params.get("caseId")

        let complaintId = null

        fetch("/api/location")
            .then(res => res.json())
            .then(data => {

                const complaint = data.find(c => c.caseId === caseId)

                complaintId = complaint._id

                document.getElementById("caseId").innerText = complaint.caseId
                document.getElementById("title").innerText = complaint.title
                document.getElementById("description").innerText = complaint.description
                document.getElementById("category").innerText = complaint.category
                document.getElementById("location").innerText = complaint.location

                document.getElementById("date").innerText =
                    new Date(complaint.createdAt).toLocaleString()

                document.getElementById("statusSelect").value = complaint.status

                document.getElementById("photo").src =
                    "/uploads/" + complaint.photo

                const coords = complaint.location.split(",")

                const lat = parseFloat(coords[0])
                const lng = parseFloat(coords[1])

                const position = { lat: lat, lng: lng }

                const map = new google.maps.Map(document.getElementById("map"), {
                    zoom: 16,
                    center: position
                })

                new google.maps.Marker({
                    position: position,
                    map: map
                })

                const panorama = new google.maps.StreetViewPanorama(
                    document.getElementById("streetView"),
                    {
                        position: position,
                        pov: { heading: 34, pitch: 10 }
                    }
                )

                map.setStreetView(panorama)

            })

        function updateStatus() {

            fetch("/api/location/" + complaintId, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    status: document.getElementById("statusSelect").value
                })
            })
                .then(res => res.json())
                .then(() => {
                    alert("Status Updated")
                    location.reload()
                })

        }
        function toggleMode() {

            let body = document.body
            let btn = document.getElementById("modeBtn")

            body.classList.toggle("light-mode")

            if (body.classList.contains("light-mode")) {
                btn.innerText = "Dark Mode"
                localStorage.setItem("theme", "light")
            }
            else {
                btn.innerText = "Light Mode"
                localStorage.setItem("theme", "dark")
            }

        }

        window.onload = function () {

            const savedTheme = localStorage.getItem("theme")

            if (savedTheme === "light") {
                document.body.classList.add("light-mode")
                document.getElementById("modeBtn").innerText = "Dark Mode"
            }

        }
    </script>
</body>

</html>
