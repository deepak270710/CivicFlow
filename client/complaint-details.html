<!DOCTYPE html>
<html>

<head>
    <title>Complaint Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .container p {
            margin-top: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 20px;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .subtitle {
            color: #94a3b8;
            margin-top: 5px;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mode-btn {
            background: #111827;
            color: white;
            border: 1px solid #1f2937;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        .report-btn {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        body.light-mode {
            background: #f1f5f9;
            color: #0f172a;
        }

        body.light-mode img {
            border: 1px solid #ddd;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* colors */

        .pending {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.35);
        }

        .progress {
            background: rgba(250, 204, 21, 0.15);
            color: #facc15;
            border: 1px solid rgba(250, 204, 21, 0.4);
        }

        .resolved {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.4);
        }

        #caseId {
            font-size: 32px;
            font-weight: 600;
            color: #60a5fa;
            margin-top: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <header class="top-bar">

        <div>
            <h1>Complaint Details</h1>
            <p class="subtitle">View full information about your reported issue.</p>
        </div>

        <div class="user-panel">

            <span id="usernameDisplay">👤 User</span>

            <button class="mode-btn" id="modeBtn" onclick="toggleMode()">
                Light Mode
            </button>

            <button class="report-btn" onclick="goHome()">
                Return to Dashboard
            </button>

        </div>

    </header>

    <div class="container">

        <h1 id="caseId"></h1>

        <p><b>Title:</b> <span id="title"></span></p>
        <p><b>Description:</b> <span id="description"></span></p>
        <p><b>Category:</b> <span id="category"></span></p>
        <p><b>Location:</b> <span id="location"></span></p>
        <p><b>Status:</b> <span id="status" class="status"></span></p>
        <p><b>Submitted:</b> <span id="date"></span></p>

        <h3>Complaint Photo</h3>
        <img id="photo" />

        <h3>Location View</h3>

        <div style="display:flex; gap:20px; margin-top:20px;">
            <div id="map" style="height:350px;width:50%;border-radius:10px;"></div>
            <div id="streetView" style="height:350px;width:50%;border-radius:10px;"></div>
        </div>

    </div>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBdK8aDpEKJxen7AhH2gnb0j2t7uZwgYvs"></script>
    <script>
        const params = new URLSearchParams(window.location.search)
        const caseId = params.get("caseId")
        console.log("Case ID:", caseId)

        fetch("/api/complaints/" + caseId)
            .then(res => res.json())
            .then(complaint => {
                const date = new Date(complaint.createdAt)

                document.getElementById("date").innerText = date.toLocaleString()
                document.getElementById("caseId").innerText = complaint.caseId
                document.getElementById("title").innerText = complaint.title
                document.getElementById("description").innerText = complaint.description
                document.getElementById("category").innerText = complaint.category
                document.getElementById("location").innerText = complaint.location

                const statusElement = document.getElementById("status")
                statusElement.innerText = complaint.status

                if (complaint.status === "Pending") {
                    statusElement.classList.add("pending")
                }

                if (complaint.status === "In Progress") {
                    statusElement.classList.add("progress")
                }

                if (complaint.status === "Resolved") {
                    statusElement.classList.add("resolved")
                }

                document.getElementById("photo").src = "/uploads/" + complaint.photo

                const coords = complaint.location.split(",").map(v => v.trim())

                const lat = parseFloat(coords[0])
                const lng = parseFloat(coords[1])

                const position = { lat: lat, lng: lng }

                const map = new google.maps.Map(document.getElementById("map"), {
                    zoom: 16,
                    center: position
                })

                new google.maps.Marker({
                    position: position,
                    map: map
                })

                const panorama = new google.maps.StreetViewPanorama(
                    document.getElementById("streetView"),
                    {
                        position: position,
                        pov: { heading: 34, pitch: 10 }
                    }
                )

                map.setStreetView(panorama)

            })

        const user = localStorage.getItem("loggedInUser")

        if (user) {
            document.getElementById("usernameDisplay").innerText = "👤 " + user
        }

        function toggleMode() {

            let body = document.body
            let btn = document.getElementById("modeBtn")

            body.classList.toggle("light-mode")

            if (body.classList.contains("light-mode")) {
                btn.innerText = "Dark Mode"
            } else {
                btn.innerText = "Light Mode"
            }
        }

        function goHome() {
            window.location.href = "dashboard.html"
        }

    </script>
</body>

</html>
