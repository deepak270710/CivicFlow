<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>CivicFlow – Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="register">
  <header class="auth-header">
    <a href="index.html" class="auth-header__logo">
      <span class="navbar__logo-mark">CF</span>
      <span class="navbar__logo-text">CivicFlow</span>
    </a>
    <button id="themeToggle" class="theme-toggle" type="button">
      Dark mode
    </button>
  </header>

  <main class="auth-layout">
    <section class="auth-card">
      <h1 class="auth-card__title">Create your account</h1>
      <p class="auth-card__subtitle">
        Join CivicFlow and start reporting issues in your city.
      </p>
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="registerName">Full name</label>
          <input type="text" id="registerName" name="name" placeholder="Enter your full name" required />
          <p class="form-error" id="registerNameError"></p>
        </div>

        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" name="email" placeholder="you@example.com" required />
          <p class="form-error" id="registerEmailError"></p>
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" name="password" placeholder="Create a strong password"
            required />
          <p class="form-error" id="registerPasswordError"></p>
        </div>

        <button type="submit" class="btn btn--primary btn--full">
          Register
        </button>
        <!-- <p class="form-success" id="registerSuccess"></p> -->
        <!-- <button type="submit">Register</button> -->
        <p class="form-success" id="registerSuccess"></p>
      </form>

      <p class="auth-card__footer">
        Already have an account?
        <a href="login.html">Login</a>
      </p>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>

</html>
